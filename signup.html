<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VisionNest - Register</title>
    <!-- Bootstrap CSS (ID dynamic loader) -->
    <link id="bootstrap-link" rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <!-- AOS Scroll Animation -->
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css">
    <!-- Custom Premium CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/svg+xml" href="IMAGE/favicon.svg">

    <!-- Inline script to prevent theme/RTL flash -->
    <script>
        (function () {
            const theme = localStorage.getItem('theme') || 'light';
            const dir = localStorage.getItem('dir') || 'ltr';
            document.documentElement.setAttribute('data-theme', theme);
            document.documentElement.setAttribute('dir', dir);
            document.documentElement.setAttribute('lang', dir === 'rtl' ? 'ar' : 'en');

            const bootstrapLink = document.getElementById('bootstrap-link');
            if (bootstrapLink) {
                bootstrapLink.href = dir === 'rtl'
                    ? 'https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css'
                    : 'https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css';
            }
        })();


        window.handleImageError = function (imgElement, type) {
            if (imgElement.dataset.fallbackTriggered) return;
            imgElement.dataset.fallbackTriggered = "true";
            const fallbacks = {
                doctor: "https://images.unsplash.com/photo-1559839734-2b71ea197ec2?auto=format&fit=crop&w=600&q=80",
                scan: "https://images.unsplash.com/photo-1581594693702-fbdc51b2763b?auto=format&fit=crop&w=600&q=80",
                surgery: "https://images.unsplash.com/photo-1584515979956-d9f6e5d09982?auto=format&fit=crop&w=600&q=80",
                eye: "https://images.unsplash.com/photo-1607613009820-a29f7bb81c04?auto=format&fit=crop&w=600&q=80"
            };
            imgElement.src = fallbacks[type] || fallbacks.eye;
            imgElement.onerror = function () {
                const container = document.createElement('div');
                container.className = imgElement.className + " d-flex flex-column align-items-center justify-content-center text-center p-3";
                container.style.width = imgElement.style.width || (imgElement.width ? imgElement.width + 'px' : '100%');
                container.style.height = imgElement.style.height || (imgElement.height ? imgElement.height + 'px' : '220px');
                container.style.background = "linear-gradient(135deg, rgba(15,76,129,0.1) 0%, rgba(75,163,199,0.1) 100%)";
                container.style.border = "1px solid var(--card-border)";
                container.style.borderRadius = "16px";
                container.style.color = "var(--text-color)";
                container.style.display = "inline-flex";
                let icon = type === 'doctor' ? 'user' : (type === 'surgery' ? 'shield' : 'eye');
                let text = type === 'doctor' ? 'Medical Specialist' : (type === 'surgery' ? 'Surgical Suite' : 'Clinical Diagnostic');
                container.innerHTML = `
                    <i data-lucide="${icon}" style="width: 32px; height: 32px; color: var(--secondary-color); margin-bottom: 8px;"></i>
                    <span style="font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-color);">${text}</span>
                    <span style="font-size: 0.7rem; opacity: 0.5; margin-top: 3px; color: var(--text-color);">VisionNest Care</span>
                `;
                imgElement.parentNode.replaceChild(container, imgElement);
                if (typeof lucide !== 'undefined') lucide.createIcons();
            };
        };

    </script>
</head>

<body
    style="background: var(--bg-offset); min-height: 100vh; position: relative; overflow-x: hidden; display: flex; align-items: center; justify-content: center; padding: 40px 20px;">

    <!-- Decorative background shapes -->
    <div class="hero-bg-shapes">
        <div class="hero-shape shape-1" style="opacity: 0.5;"></div>
        <div class="hero-shape shape-2" style="opacity: 0.5;"></div>
    </div>

    <!-- Floating Theme / RTL Toggles -->
    <div class="position-absolute d-flex gap-2" style="top: 20px; right: 20px; z-index: 1000;">
        <button id="rtl-toggle" class="toggle-btn" aria-label="Toggle RTL Mode">
            <i data-lucide="arrow-left-right"></i>
        </button>
        <button id="theme-toggle" class="toggle-btn" aria-label="Toggle Dark Mode">
            <i data-lucide="moon"></i>
        </button>
    </div>

    <!-- Centered Signup Card -->
    <div class="w-100" style="max-width: 450px; z-index: 10;" data-aos="zoom-in">
        <div class="glass-panel p-4 p-sm-5 w-100">
            <!-- Logo inside Card -->
            <div class="text-center mb-4">
                <a href="index.html" class="d-inline-flex align-items-center justify-content-center text-decoration-none gap-2 mb-3">
                    <div class="toggle-btn bg-primary text-white border-0"
                        style="width: 40px; height: 40px; cursor: pointer; display: flex; align-items: center; justify-content: center;">
                        <i data-lucide="eye"></i>
                    </div>
                    <span class="fs-4 fw-bold text-color font-heading">VisionNest</span>
                </a>
                <h4 class="text-color mb-0 font-heading">Register Account</h4>
                <p class="text-muted small">Begin your patient onboarding flow</p>
            </div>

            <!-- Register Form -->
            <form action="dashboard.html" method="get">
                <div class="form-group-custom">
                    <label class="form-label-custom">Full Name</label>
                    <input type="text" class="form-control-custom" placeholder="John Doe" required>
                </div>

                <div class="form-group-custom">
                    <label class="form-label-custom">Email Address</label>
                    <input type="email" class="form-control-custom" placeholder="johndoe@gmail.com" required>
                </div>

                <div class="form-group-custom">
                    <label class="form-label-custom">Phone Number</label>
                    <input type="tel" class="form-control-custom" placeholder="+1 (555) 123-4567" required>
                </div>

                <div class="form-group-custom">
                    <label class="form-label-custom">Password</label>
                    <input type="password" class="form-control-custom" placeholder="••••••••" required>
                </div>

                <div class="form-group-custom">
                    <label class="form-label-custom">Confirm Password</label>
                    <input type="password" class="form-control-custom" placeholder="••••••••" required>
                </div>

                <div class="form-check mb-4">
                    <input type="checkbox" class="form-check-input" id="terms" required style="cursor: pointer;">
                    <label class="form-check-label text-color small" for="terms" style="cursor: pointer;">I agree to the
                        Terms of Service & Privacy Policy</label>
                </div>

                <!-- Centered button inside Card -->
                <div class="centered-btn-wrapper my-0">
                    <button type="submit" class="btn-primary-custom w-100 justify-content-center">Create
                        Account</button>
                </div>
            </form>

            <hr class="text-color opacity-10 my-4">

            <!-- Social Signups -->
            <div class="d-flex justify-content-center gap-3">
                <button type="button" class="toggle-btn" style="width: 48px; height: 48px;" aria-label="Sign up with Google" title="Sign up with Google">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
                        <path d="M15.545 6.558a9.4 9.4 0 0 1 .139 1.626c0 2.434-.87 4.492-2.384 5.885h.002C11.978 15.292 10.158 16 8 16A8 8 0 1 1 8 0a7.7 7.7 0 0 1 5.352 2.082l-2.284 2.284A4.35 4.35 0 0 0 8 3.166c-2.087 0-3.86 1.408-4.492 3.304a4.8 4.8 0 0 0 0 3.063h.003c.635 1.893 2.405 3.301 4.492 3.301 1.078 0 2.004-.276 2.722-.764h-.003a3.7 3.7 0 0 0 1.599-2.431H8v-3.08z"/>
                    </svg>
                </button>
                <button type="button" class="toggle-btn" style="width: 48px; height: 48px;" aria-label="Sign up with Apple" title="Sign up with Apple">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
                        <path d="M11.182.008C11.148-.03 9.923.023 8.857 1.18c-1.066 1.156-.902 2.482-.878 2.516s1.52.087 2.475-1.258.762-2.391.728-2.43m3.314 11.733c-.048-.096-2.325-1.234-2.113-3.422s1.675-2.789 1.698-2.854-.597-.79-1.254-1.157a3.7 3.7 0 0 0-1.563-.434c-.108-.003-.483-.095-1.254.116-.508.139-1.653.589-1.968.607-.316.018-1.256-.522-2.267-.665-.647-.125-1.333.131-1.824.328-.49.196-1.422.754-2.074 2.237-.652 1.482-.311 3.83-.067 4.56s.625 1.924 1.273 2.796c.576.984 1.34 1.667 1.659 1.899s1.219.386 1.843.067c.502-.308 1.408-.485 1.766-.472.357.013 1.061.154 1.782.539.571.197 1.111.115 1.652-.105.541-.221 1.324-1.059 2.238-2.758q.52-1.185.473-1.282"/>
                    </svg>
                </button>
                <button type="button" class="toggle-btn" style="width: 48px; height: 48px;" aria-label="Sign up with Facebook" title="Sign up with Facebook">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
                        <path d="M16 8.049c0-4.446-3.582-8.05-8-8.05C3.58 0-.002 3.603-.002 8.05c0 4.017 2.926 7.347 6.75 7.951v-5.625h-2.03V8.05H6.75V6.275c0-2.017 1.195-3.131 3.022-3.131.876 0 1.791.157 1.791.157v1.98h-1.009c-.993 0-1.303.621-1.303 1.258v1.51h2.218l-.354 2.326H9.25V16c3.824-.604 6.75-3.934 6.75-7.951"/>
                    </svg>
                </button>
            </div>

            <p class="text-center text-muted small mt-4 mb-0">
                Already have an account? <a href="login.html"
                    class="text-secondary-color text-decoration-none fw-bold">log in </a>
            </p>
        </div>
    </div>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <!-- AOS Animation JS -->
    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <!-- Custom theme script -->
    <script src="js/theme.js"></script>

    <script>
        AOS.init({
            once: true,
            duration: 800
        });
    </script>
</body>

</html>
